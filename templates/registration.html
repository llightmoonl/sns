<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Регистрация</title>
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <link rel="stylesheet" href="/static/css/reg_log.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="/static/images/logo.png">Сверточные нейросети
        </div>
        <div class="registration">
            <a href="login">Вход</a>
        </div>
    </header>

    <main>
        <div class = "container">
            <form action = "{{ url_for('registration') }}" method = "post">
                <h3>Введите данные для регистрации нового аккаунта</h3>
                <input type="text" name="first_name" placeholder="Имя" required>
                <input type="text" name="last_name" placeholder="Фамилия" required>
                <input type="text" name="username" placeholder="Логин" required>
                <input type="password" name="password" placeholder="Пароль" required>
                <button type="submit" class="btn">Зарегистрироваться</button>
            </form>
        </div>
    </main>

    <footer>
        &copy; 2026, Ермоленко И.С., ВГСПУ, МИФ<br>
        Просим оценить веб-приложение в соответствующей вашей группе Яндекс-форме: 
        <a href="https://forms.yandex.ru/u/69a55c0002848f80e010da56" class="styled-link">МИФ-МИБ-5</a>, 
        <a href="https://forms.yandex.ru/u/6a0c1fb9d046882160038b87" class="styled-link">МИФ-ПИБ-4</a>.<br>
        Ваше мнение важно для улучшения качества веб-приложения!
    </footer>

</body>

</html>
